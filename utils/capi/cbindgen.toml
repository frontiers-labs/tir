language = "C"
style = "tag"
include_guard = "TIR_H"
pragma_once = true
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. */"
cpp_compat = true
# Context and PassManager live in the `tir` crate, which cbindgen does not
# parse, so declare the opaque handles it references by pointer.
after_includes = "\ntypedef struct TirContext TirContext;\ntypedef struct TirPassManager TirPassManager;\n#define TIR_INVALID_ID UINT32_MAX\n\n/* Attribute kind codes returned by tir_op_attribute_kind. */\n#define TIR_ATTR_STR 0\n#define TIR_ATTR_INT 1\n#define TIR_ATTR_UINT 2\n#define TIR_ATTR_F32 3\n#define TIR_ATTR_F64 4\n#define TIR_ATTR_BOOL 5\n#define TIR_ATTR_ARRAY 6\n#define TIR_ATTR_DICT 7\n#define TIR_ATTR_REGISTER 8\n#define TIR_ATTR_TYPE 9\n#define TIR_ATTR_BLOCK 10\n\n/* Target codegen stages for tir_context_run_target_pipeline. */\n#define TIR_STAGE_ISEL 0\n#define TIR_STAGE_REGALLOC 1\n#define TIR_STAGE_FINALIZE 2"

[export]
prefix = "Tir"
exclude = ["TIR_INVALID_ID"]

[enum]
prefix_with_name = true
